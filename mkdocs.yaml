site_name: "Exploring Electronics"
site_url: https://bradpenney.github.io/exploring_electronics/
site_description: "Electronics for software developers — from your first resistor to building connected devices."
site_author: Brad Penney

extra:
  analytics:
    provider: google
    property: G-V01MJ4R3SQ
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/bradpenney
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/bradpenney

extra_css:
  - stylesheets/extra.css

theme:
  name: material
  palette:
    scheme: slate
    primary: black
    accent: amber
  logo: images/exploring_electronics.png
  favicon: images/exploring_electronics.png
  icon:
    admonition:
      note: octicons/tag-16
      abstract: octicons/checklist-16
      info: octicons/info-16
      tip: octicons/squirrel-16
      success: octicons/check-16
      question: octicons/question-16
      warning: octicons/alert-16
      failure: octicons/x-circle-16
      danger: octicons/zap-16
      bug: octicons/bug-16
      example: octicons/beaker-16
      quote: octicons/quote-16
  features:
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - content.code.highlight
    - content.tooltips
    - content.code.mermaid

plugins:
  - search
  - meta
  - exclude:
      glob:
        - "efficient/*"
        - "mastery/*"
        - "tools/multimeter.md"
        - "tools/arduino_cli.md"
        - "tools/soldering.md"
        - "tools/bench_power_supply.md"
  - social:
      cards: true
      cards_layout_options:
        background_color: "#1a202c"
        color: "#cbd5e0"
  - htmlproofer:
      enabled: true
      validate_rendered_template: true
      validate_external_urls: false
      raise_error: true
      raise_error_after_finish: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - 📦 Essential:
      - What Is Electricity?: essential/what_is_electricity.md

# 📦 Essential — add articles here as they are published

  - 🔧 Practical Tools:
      - Breadboards: tools/breadboards.md
